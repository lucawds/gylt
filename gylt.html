<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GYLT - Tagebuch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="gylt.css" />
</head>
<body class="gyltPage gyltDiaryOverview">
  <header class="topbar gyltTopbar">
    <a href="homepage.html" class="ghost gyltBackLink">Zurück</a>

    <div class="gyltTitleBlock">
      <div class="small gyltHeaderEyebrow">GYLT Alpha</div>
      <h1>GYLT</h1>
    </div>

    <div class="small gyltHeaderMeta">Get Your Live Together</div>
  </header>

  <main class="view gyltMain">
    <div class="gyltPhoneStage">
      <div class="gyltPhoneFrame">
        <div class="gyltPhoneNotch" aria-hidden="true"></div>

        <div class="gyltPhoneScreen">
          <section class="panel gyltWeekPanel gyltWeekPanelOverview" aria-label="Tagebuch-Woche">
            <div class="panelHeader">
              <h3>Woche</h3>
              <div id="gyltWeekRange" class="small">-</div>
            </div>

            <div id="gyltWeekGrid" class="gyltWeekGrid gyltWeekGridSimple" aria-live="polite"></div>
          </section>

          <nav class="gyltBottomNav" aria-label="App Navigation">
            <a class="gyltBottomNavItem isActive" href="gylt.html">Tagebuch</a>
            <a class="gyltBottomNavItem" href="gylt-stats.html">Statistiken</a>
            <a class="gyltBottomNavItem" href="gylt-profile.html">Mein Profil</a>
            <a class="gyltBottomNavItem" href="gylt-fitness.html">Fitness</a>
            <a class="gyltBottomNavItem" href="gylt-settings.html">Einstellungen</a>
          </nav>
        </div>
      </div>

      <div class="gyltPhoneHint small">Handy-Ansicht für die spätere App.</div>
    </div>
  </main>
  <script src="gylt.js"></script>
</body>
</html>
